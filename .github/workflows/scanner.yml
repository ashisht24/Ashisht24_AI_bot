name: Nifty 50 Scanner

on:
  schedule:
    - cron: '*/30 3-10 * * 1-5' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Force Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        env:
          # This forces pip to ignore any old cached versions
          PIP_NO_CACHE_DIR: false
        run: |
          python -m pip install --upgrade pip
          # This is the "classic" version you need
          pip install git+https://github.com/twopirllc/pandas-ta.git@development
          # Install others one by one to ensure they don't conflict
          pip install yfinance pandas prophet textblob python-telegram-bot

      - name: Run Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py
