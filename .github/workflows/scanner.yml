name: Nifty 50 Scanner

on:
  schedule:
    # Runs every 30 minutes, Mon-Fri (Approx 9:00 AM - 3:30 PM IST)
    - cron: '*/30 3-10 * * 1-5' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # This opts into Node 24 early to remove the deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_TOKEN: ${{ secrets.TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated from v3 to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4 to v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scanner
        run: python scanner.py
