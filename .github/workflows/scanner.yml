name: Nifty 50 Scanner

on:
  schedule:
    - cron: '*/30 3-10 * * 1-5' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. Install the "Classic" development code directly from the zip archive
          # This bypasses the "No matching distribution" error entirely
          pip install https://github.com/twopirllc/pandas-ta/archive/refs/heads/development.zip
          
          # 2. Install the rest of your stack
          pip install yfinance "pandas<3.0.0" "numpy<2.0.0" prophet textblob python-telegram-bot

      - name: Run Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py
